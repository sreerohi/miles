name: PR Test (ROCm)

on:
  pull_request:
    branches: [main]
    types: [synchronize, labeled]
  workflow_dispatch:
    inputs:
      infinite_run:
        description: 'Run training infinitely'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    if: (github.event_name == 'workflow_dispatch') || (github.event.pull_request)
    runs-on: [self-hosted, rocm, mi300x]
    container:
      image: rlsys/miles:rocm7-mi300-sglang0.5.9-te2.10.0-dev-307b5e86
      options: >
        --device=/dev/kfd
        --device=/dev/dri
        --security-opt seccomp=unconfined
        --group-add 44
        --group-add 109
        --cap-add=SYS_PTRACE
        --ipc=host
        --shm-size=32g
        --ulimit memlock=-1
        --ulimit stack=67108864
        --memory=0
        --memory-swap=0
        --privileged
        --ulimit nofile=65535:65535
        -v /tmp:/tmp
    strategy:
      fail-fast: false
      matrix:
        info:
          - {"num_gpus": 0, "test_file": "fast"}
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    env:
      GITHUB_COMMIT_NAME: ${{ github.sha }}_${{ github.event.pull_request.number || 'non-pr' }}
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
      MILES_TEST_ENABLE_INFINITE_RUN: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.infinite_run) || 'false' }}
      MILES_TEST_USE_DEEPEP: ${{ matrix.info.use_deepep || '0' }}
      MILES_TEST_USE_FP8_ROLLOUT: ${{ matrix.info.use_fp8_rollout || '0' }}
      MILES_TEST_USE_INT4_ROLLOUT: ${{ matrix.info.use_int4_rollout || '0' }}
      MILES_TEST_ENABLE_EVAL: ${{ matrix.info.enable_eval || '1' }}
      MILES_TEST_FEW_GPU: '0'
    steps:
      - uses: actions/checkout@v4
      - name: Cleanup Ray processes
        shell: bash
        run: |
          pkill -9 -f 'ray::' 2>/dev/null || true
          pkill -9 -f raylet 2>/dev/null || true
          pkill -9 -f gcs_server 2>/dev/null || true
          pkill -9 sglang 2>/dev/null || true
          ray stop --force 2>/dev/null || true
          rm -rf /tmp/ray/* 2>/dev/null || true
          sleep 3
      - name: Install
        shell: bash
        run: cd $GITHUB_WORKSPACE && pip install -e . --no-deps --break-system-packages
      - name: Execute
        shell: bash
        run: python tests/ci/gpu_lock_exec.py --count ${{ matrix.info.num_gpus }} -- pytest tests/${{ matrix.info.test_file }}